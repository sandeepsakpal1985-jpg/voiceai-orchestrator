# ============================================================================
# VoiceAI Orchestrator — CI/CD Pipeline
#
# Runs on every push to master and every pull request.
# Jobs: lint backend → test backend → test dashboard → E2E smoke
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    paths:
      - "app/**"
      - "dashboard/**"
      - "requirements.txt"
      - "dashboard/package.json"
      - "dashboard/package-lock.json"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "livekit*.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend: Lint ──────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-complexity=10 --max-line-length=120 --statistics

  # ─── Backend: Unit Tests ────────────────────────────────────────
  backend-test:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    needs: [backend-lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        run: |
          python -m pytest app/__tests__/ -v --no-header -x --timeout=120
        env:
          STT_PROVIDER: whisper
          LLM_PROVIDER: ollama
          TTS_PROVIDER: kokoro
          LIVEKIT_ENABLED: "false"
          SIP_ENABLED: "false"
          PYTHONDONTWRITEBYTECODE: 1

  # ─── Dashboard: Unit Tests ──────────────────────────────────────
  dashboard-test:
    name: Dashboard — Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Run vitest tests
        working-directory: ./dashboard
        run: npx vitest run --reporter=verbose
        env:
          CI: "true"
          NEXTAUTH_SECRET: test-secret
          DATABASE_URL: postgresql://voiceai:voiceai@localhost:5432/voiceai

  # ─── E2E Smoke Tests ────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke Tests (SIP + LiveKit)
    runs-on: ubuntu-latest
    needs: [backend-test, dashboard-test]
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Start test infrastructure
        run: |
          docker compose -f docker-compose.test.yml up --build -d livekit-server redis
          echo "Waiting for services to be healthy..."
          sleep 15

      - name: Run SIP smoke test
        run: |
          docker compose -f docker-compose.test.yml run --rm test-runner

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs --tail=100 livekit-server

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v
