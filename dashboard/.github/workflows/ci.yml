# ============================================================================
# VoiceAI Dashboard — Continuous Integration
#
# Runs on every push to main and every pull request.
# Steps: typecheck → lint → test → build
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/voiceai_test"

jobs:
  validate:
    name: Validate (TypeScript + Lint + Tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voiceai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push Prisma schema
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint

      - name: Run unit tests
        run: npx vitest run --reporter=verbose
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: "test-secret-for-ci-do-not-use-in-production"

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run e2e tests
        run: npx playwright test --reporter=list
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: "test-secret-for-ci-do-not-use-in-production"

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: "test-secret-for-ci-do-not-use-in-production"
          NEXT_PUBLIC_WS_URL: "ws://localhost:3001"
