# ============================================================================
# LiveKit Server Configuration — Self-Hosted
# ============================================================================
# This config is used by the livekit-server Docker container.
#
# For production:
#   1. Change the API keys below
#   2. Set a domain and configure TLS/certificates
#   3. For SIP/Twilio, run a separate livekit-sip service
# ============================================================================

# Main server port (WebSocket + RTC)
port: 7880

bind_addresses:
  - "0.0.0.0"

# API Keys — used for JWT authentication (replaces old api.key/api.secret)
keys:
  devkey: devsecret

# WebRTC Configuration
rtc:
  port_range_start: 7882
  port_range_end: 7882
  udp_port: 7882
  tcp_port: 7882
  use_external_ip: false
  # For production behind NAT, set your public IP:
  # node_ip: "your-public-ip"

# Redis Configuration (required for multi-node scaling)
redis:
  address: "redis:6379"
  # password: "optional-redis-password"

# Logging
log_level: info

# Room Defaults
room:
  enabled_codecs:
    - mime: audio/opus
    - mime: audio/red
  max_participants: 10
  empty_timeout: 300  # 5 minutes before empty room cleanup

# WebHook Configuration (optional — for room events)
# webhook:
#   urls:
#     - "http://voiceai-api:8000/livekit/webhook"
#   api_key: devkey
